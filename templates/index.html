<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Smart Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Custom overrides to make markdown match Flipkart's clean brand look */
        .prose strong {
            color: #0f172a !important;
            font-weight: 700 !important;
        }

        .prose ul {
            list-style-type: disc !important;
            padding-left: 1.25rem !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
        }

        .prose ol {
            list-style-type: decimal !important;
            padding-left: 1.25rem !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
        }

        .prose li {
            margin-top: 0.25rem !important;
            margin-bottom: 0.25rem !important;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans h-screen flex flex-col antialiased">

    <header
        class="bg-[#2874f0] text-white shadow-md sticky top-0 z-50 px-4 py-3 sm:px-8 flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <span class="italic font-bold text-xl tracking-wide">Flipkart</span>
            <span class="text-xs italic text-[#ffe500] font-medium -mt-1 flex items-center">
                Explore <span class="font-extrabold ml-0.5">Plus</span>
                <i data-lucide="sparkles" class="w-3 h-3 ml-0.5 fill-[#ffe500]"></i>
            </span>
        </div>
        <div
            class="hidden sm:flex items-center space-x-1 text-sm font-semibold bg-white/10 px-3 py-1.5 rounded-full border border-white/20">
            <i data-lucide="shield-check" class="w-4 h-4 text-[#ffe500] mr-1"></i>
            <span>AI Product Recommendations</span>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto p-3 sm:p-6 flex flex-col justify-center h-[calc(100vh-56px)]">
        <div
            class="bg-white rounded-2xl shadow-xl border border-slate-100 flex flex-col overflow-hidden h-full max-h-[800px]">

            <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="relative">
                        <div
                            class="w-11 h-11 rounded-xl bg-gradient-to-tr from-[#2874f0] to-blue-400 flex items-center justify-center text-white shadow-sm">
                            <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                        </div>
                        <span
                            class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-emerald-500 ring-2 ring-white"></span>
                    </div>
                    <div>
                        <h2 class="font-semibold text-slate-800 text-base leading-tight">Flipkart Personal Shopper</h2>
                        <span class="text-xs font-medium text-slate-500 flex items-center mt-0.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 animate-pulse"></span>
                            Online & Ready
                        </span>
                    </div>
                </div>

                <button onclick="clearChat()"
                    class="text-slate-400 hover:text-slate-600 p-2 rounded-lg hover:bg-slate-100 transition-colors"
                    title="Clear conversation">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="messageFormeight"
                class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 custom-scrollbar bg-gradient-to-b from-slate-50/30 to-white">

                <div class="flex items-start space-x-3 max-w-[85%]">
                    <div
                        class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-100 flex items-center justify-center text-[#2874f0] flex-shrink-0">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                    </div>
                    <div
                        class="bg-slate-100 text-slate-800 rounded-2xl rounded-tl-none px-4 py-3 text-sm shadow-sm leading-relaxed">
                        Hi there! 👋 I am your smart Flipkart assistant. Tell me what you're looking for today, and I'll
                        find you top-rated product recommendations instantly!
                        <span class="block text-[10px] text-slate-400 mt-1.5 text-left font-medium">Just now</span>
                    </div>
                </div>

            </div>

            <div class="p-4 border-t border-slate-100 bg-white">
                <form id="messageArea" class="flex items-center space-x-3">
                    <div class="relative flex-1 flex items-center">
                        <i data-lucide="search" class="absolute left-4 text-slate-400 w-5 h-5 pointer-events-none"></i>
                        <input type="text" id="text" name="msg"
                            placeholder="Type a product, brand or category (e.g., best running shoes)..."
                            autocomplete="off"
                            class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#2874f0]/20 focus:border-[#2874f0] text-sm text-slate-800 placeholder-slate-400 transition-all"
                            required />
                    </div>
                    <button type="submit" id="send"
                        class="bg-[#2874f0] hover:bg-[#1a5ec4] text-white px-5 py-3.5 rounded-xl font-medium text-sm flex items-center space-x-2 shadow-sm transition-all transform active:scale-95 flex-shrink-0">
                        <span class="hidden sm:inline">Search</span>
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        function getFormattedTime() {
            const date = new Date();
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function clearChat() {
            if (confirm("Do you want to clear your conversation history?")) {
                location.reload();
            }
        }

        // Configure Marked options to properly handle line breaks securely
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        $(document).ready(function () {
            lucide.createIcons();

            $("#messageArea").on("submit", function (event) {
                event.preventDefault();

                const str_time = getFormattedTime();
                const rawText = $("#text").val().trim();
                if (!rawText) return;

                // User Message Template
                const userHtml = `
                    <div class="flex items-start space-x-3 justify-end max-w-[85%] ml-auto">
                        <div class="bg-[#2874f0] text-white rounded-2xl rounded-tr-none px-4 py-3 text-sm shadow-sm leading-relaxed">
                            <p class="whitespace-pre-wrap">${rawText}</p>
                            <span class="block text-[10px] text-blue-200 mt-1.5 text-right font-medium">${str_time}</span>
                        </div>
                        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white flex-shrink-0 shadow-sm">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </div>
                    </div>
                `;

                $("#text").val("");
                $("#messageFormeight").append(userHtml);
                $("#messageFormeight").animate({ scrollTop: $("#messageFormeight").prop("scrollHeight") }, 300);

                // Bot Loading Placeholder
                const loadingId = "bot-loading-" + Date.now();
                const loadingHtml = `
                    <div id="${loadingId}" class="flex items-start space-x-3 max-w-[85%]">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-100 flex items-center justify-center text-[#2874f0] flex-shrink-0">
                            <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                        </div>
                        <div class="bg-slate-100 text-slate-500 rounded-2xl rounded-tl-none px-4 py-3 text-sm shadow-sm flex items-center space-x-1.5">
                            <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                            <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                            <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                        </div>
                    </div>
                `;
                $("#messageFormeight").append(loadingHtml);
                lucide.createIcons();
                $("#messageFormeight").animate({ scrollTop: $("#messageFormeight").prop("scrollHeight") }, 300);

                // Backend Request
                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                }).done(function (data) {
                    $(`#${loadingId}`).remove();

                    // Parse text response using the Marked markdown compilation library
                    const parsedMarkdown = marked.parse(data);

                    // Bot Response Template with parsed markdown block
                    const botHtml = `
                        <div class="flex items-start space-x-3 max-w-[85%]">
                            <div class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-100 flex items-center justify-center text-[#2874f0] flex-shrink-0">
                                <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                            </div>
                            <div class="bg-slate-100 text-slate-800 rounded-2xl rounded-tl-none px-5 py-4 text-sm shadow-sm leading-relaxed w-full">
                                <div class="prose prose-sm prose-slate max-w-none text-slate-700">
                                    ${parsedMarkdown}
                                </div>
                                <span class="block text-[10px] text-slate-400 mt-2 text-left font-medium">${str_time}</span>
                            </div>
                        </div>
                    `;

                    $("#messageFormeight").append($.parseHTML(botHtml));
                    lucide.createIcons();
                    $("#messageFormeight").animate({ scrollTop: $("#messageFormeight").prop("scrollHeight") }, 300);
                }).fail(function () {
                    $(`#${loadingId}`).remove();
                });
            });
        });
    </script>
</body>

</html>
